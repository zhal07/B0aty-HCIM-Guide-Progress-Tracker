<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>B0aty HCIM Guide v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="page-outer">
    <div class="page-inner">
<header>
        <h1>B0aty HCIM Guide v3.0</h1>

        <div class="buttons-container">
            <div class="episode-select" id="episodeButtons"></div>
            <div class="utility-buttons-row">
                <div class="tooltip-wrap" data-tooltip="Resume from last incomplete task">
                    <button class="btn" id="continueRunBtn" type="button">
                        <span class="material-symbols-outlined btn-icon">resume</span>
                    </button>
                </div>
                <div class="utility-buttons-right">
                    <div class="tooltip-wrap" id="expandAllTooltip" data-tooltip="Expand all banks">
                        <button class="btn" id="expandAllBtn" type="button"
                            data-icon-expand="expand_all"
                            data-icon-collapse="collapse_all">
                            <span class="material-symbols-outlined btn-icon" id="expandAllIcon">expand_all</span>
                        </button>
                    </div>
                    <div class="tooltip-wrap" id="markAllTooltip" data-tooltip="Mark all tasks complete">
                        <button class="btn" id="markAllBtn" type="button"
                            data-icon-mark="done_all"
                            data-icon-unmark="remove_done">
                            <span class="material-symbols-outlined btn-icon">done_all</span>
                        </button>
                    </div>
                    <div class="tooltip-wrap" data-tooltip="Reset all progress">
                        <button class="btn btn-danger" id="resetProgressBtn" type="button">
                            <span class="material-symbols-outlined btn-icon">settings_backup_restore</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
</header>

<div class="progress-bar-container">
    <div class="progress-bar-body">
        <div class="progress-bar-labels">
            <span class="progress-label-left">Episode Progress</span>
            <span class="progress-label-count" id="progressText">0 / 0</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
            <span class="progress-percent" id="progressPercent">0%</span>
        </div>
    </div>
</div>

<!-- Side Action Bar -->
<div class="side-action-bar">
    <div class="action-slot-container">
        <div class="tooltip-wrap" data-tooltip="Jump to current task">
            <button class="action-slot" id="resumeBtn" type="button">
                <span class="material-symbols-outlined">my_location</span>
            </button>
        </div>
        <div class="tooltip-wrap" data-tooltip="Scroll to top">
            <button class="action-slot" id="topBtn" type="button">
                <span class="material-symbols-outlined">arrow_shape_up_stack_2</span>
            </button>
        </div>
        <div class="tooltip-wrap" data-tooltip="Previous episode">
            <button class="action-slot" id="prevEpisodeBtn" type="button">
                <span class="material-symbols-outlined">skip_previous</span>
            </button>
        </div>
        <div class="tooltip-wrap" data-tooltip="Next episode">
            <button class="action-slot" id="nextEpisodeBtn" type="button">
                <span class="material-symbols-outlined">skip_next</span>
            </button>
        </div>
    </div>
</div>

<div id="checklistContainer" class="checklist-container"></div>

    </div>
</div>

<script src="data.js" defer></script>
<script src="app.js" defer></script>

</body>

</html>
